body:
  text: 三才定位圖上清洞眞九宫紫房圖三才定位圖篇目通奉大夫守尚書右僕射兼中書侍郎上柱國清河郡開國公食邑二千九百戶食實封九百户張商英進上篇靈樞經曰崑崙山之頂曰玉京山玉京天一帝四方各八天帝凡三十三帝太史公所謂日月隱蔽以爲晝夜者也玉京天帝所居之殿翊聖傳謂之通明殿以帝之身光與殿光相照靈樞經曰玉京天之上有三清天泰清天又謂之大赤天列子亦曰仰不見日月俯不見河海蓋此天也上清天又曰禹餘天玉清天又曰清微天蓋九皇降氣肇有隂陽神通變化物我受樂即此天也虚皇天者此天眞九皇所以降氣於上風下澤而造世界也氣有隂陽則人有男女洞經謂之玉童玉女此臣所以列三清所居玉清爲清微天上清爲禹餘天泰清爲大赤天也下篇易之八卦蓋祖乎天眞九皇之氣也純陽爲乾而居西北純隂爲坤而居西南乾陽下降而奪坤中之隂故坎中實而爲月也坤隂上升而奪乾中之陽故离中虚而爲日也月也者受日之氣而行於十二辰者也晦則爲坤體望則爲乾體三日至七日出於庚而爲震八日至十二日出於丁而爲兊十三至十七日出於甲而爲乾十八至二十二日出於辛而爲巽二十三至二十七日出於戊而爲艮二十八至初二日没於乙而爲坤是故五日爲一候三候爲一氣而分至啓閉於是乎不差抄忽其在易之六十四象离爲火爲電坎爲水爲雲而不曰日月蓋日月者變乾坤震兊艮巽以成嵗月日時者也八於象則滯於變矣漢儒乃以四正爲方伯卦又以六子爲乾坤之用皆臆説也三皇五帝仲尼以此窮理以此盡性而至於命若夫不以神㑹而以智知豈非所謂過此以徃未之或知者哉虚皇天天真九皇虚皇玄老虚皇玄帝虚皇玄尊虚皇玄君玉清天清微玉清天帝天寶君紫道虚皇上君翼日虚皇太上道君昌陽始虚髙皇元君七靜道生髙上虚皇君太明虚皇洞清君始玄虚皇大霄君七觀玄生虚皇金靈君八觀髙玄虚皇渟景君紫暉太上玉皇明上大道君上虚紫映九霄眞王紫虚髙上玄皇道君洞虚三元太明上皇道君太素髙虚上極紫皇道君虚明紫蘭中元髙上嵉皇道君東明髙上虚皇道君西華髙上虚皇道君南朱髙上虚皇道君北真髙上虚皇道君中元上合虚皇道君五靈七明混生髙上道君三元無上眞老虚皇元晨君三元四極眞上虚皇元靈君三元晨中黃景虚皇元臺君三元紫映暉神虚生眞元胎君髙上虚皇君上皇玉虚君皇上玉帝君皇清洞眞君髙上太素君紫虚皇上太帝皇上萬始先生上皇先生紫晨君紫虚皇老上帝君青靈陽安元君眞虚太真洞景君無英中眞上老君上清天禹餘上清天靈寳君紫清太素髙虚洞曜三元道君紫晨太微天帝道君四斗中眞七晨散華君紫虚三元紫精君眞寂九元上虚皇君上清紫精三素君太虚上霄飛晨中央黃老道君太元東霞桑丹林大帝上道君金闕後聖太平李眞天帝上景君太虚後聖元景彭室眞君東華方諸宫髙晨師玉保王青童道君太無晨中君刋峩眉山中洞宫玉户太素君紫虚玉皇先生紫晨君太明靈輝中眞無上君九皇上眞司命君東方上始少陽青帝南方通陽納隂赤帝西方少隂西金白帝北方通隂太陽黑帝中央總靈髙皇黃帝泰清天大赤泰清天神寳君眞陽元老眞一道君太極大道元景君泰清大道君皇上四老道中君皇初紫靈元君太初九素金華景元君元虛黃房眞晨君青精上眞内景君天皇上眞玉華三元君眞洲二十九眞伯上帝司禁君太極主四眞人元君晨中黃景元君上清八皇老君洞清小有玉眞萬華先生主圖玉君太一上元禁君太陽九炁玉賢元君太眞都九炁丈人主仙君西九龜山九靈眞仙毋青金丹皇君八卦降炁道言太一之先其形自然太一者元一之氣始生於太虚之中也在無極無窮之内居無形無象之初故曰太一者也上曰風下曰水二氣停澤也太虚之上有玉京之天乃玉京山也含蓮謂六元之氣感天眞九皇之神而降分混沌之象一炁始化列朴而成風水之輪二炁停澤玉京之上東南西北各有八天三十二天三十二帝也玉京之上有三清之天者乃玉清聖境上清眞境太清仙境之天三清之天上有虚皇十天其間乃虚皇元老虚皇元君虚皇元帝虚皇元尊與天眞九皇眞人而居其中天眞皇人降天眞九炁分六元爲混沌之象也少陽應乾其象曰金降天眞九皇金眞之一炁而生水中狀如戲蘂變其象上赤下黑左青右白其中央簧運之中而藏是氣也少隂應巽其象曰木降天眞九皇木眞之二炁而生風中狀如戲蘂變其象上黑下赤左白右青其中央黃運之中而藏是炁也太陽應坎其象曰水德反火降天眞九皇水德火真之三炁而生水中狀如抱卵太隂應离其象曰火德反水降天眞九皇火德水眞之四炁而生風中狀如抱卵陽明應震其象曰木䧏天眞九皇木眞之五炁而生水中狀如含蓮厥隂應兊其象曰金降天眞九皇金眞之六炁而生風中狀如含蓮三陽㑹艮其象曰土降天真九皇土眞之七炁感土而生上廓散易爲天故清陽爲天餘炁散化成日月星辰也三隂㑹坤其象曰土降天眞九皇土眞之八炁感土而下開散易爲地故濁隂爲地餘炁融結爲山川金石始出自然之正道也玉京天玉京山通明殿昊天玉皇上帝進章童子東方八天南方八天西方八天北方八天易有之門唐將軍葛將軍周將軍通眞使者引進張眞人受章童子奏書天蓬大元帥天猷大元帥翊聖保徳眞君佑聖眞武靈應真君東方天玉南方天王西方天王北方天王紫微垣天皇大帝紫微帝君北斗七星君太陽帝君太隂帝君木德星君火德星君金德星君水徳星君土德星君羅睺星君計都星君紫氣星君月孛星君東方七宿星君南方七宿星君西方七宿星君北方七宿星君鄷都六宫紂絕隂天宫泰煞諒事宗天宫明晨耐犯武城天宫恬照罪炁天宫宗靈七非天宫敢司連宛屢天宫三才定位圖三清之天上有虚皇十天其間乃虛皇元老虚皇元君虚皇元帝虚皇元尊與天眞九皇而居真中焉虚皇三天玉清天者天寳君之所治也神景内經曰太虚妙精六合相更變化之道一生一成大洞經曰分形散影位爲上眞上清天者靈寳君之所治也天人身作金華色項負圓光騰身紫霞黃庭經云上清紫霞是也泰清天者神寳君之所治也天人身有光明大洞經曰身生水火放光萬劫項負圓耀浮遊九晨三才定位圖
