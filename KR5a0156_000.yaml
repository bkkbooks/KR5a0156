body:
  text: 三才定位圖上清洞真九宫紫房圖三才定位圖篇目通奉大夫守尚書右僕射兼中書侍郎上柱國清河郡開國公食邑二千九百戶食實封九百户張商英進上篇靈樞經曰崑崙山之頂曰玉京山玉京天一帝四方各八天帝凡三十三帝太史公所謂日月隱蔽以為晝夜者也玉京天帝所居之殿翊聖傳謂之通明殿以帝之身光與殿光相照靈樞經曰玉京天之上有三清天泰清天又謂之大赤天列子亦曰仰不見日月俯不見河海蓋此天也上清天又曰禹餘天玉清天又曰清微天蓋九皇降氣肇有隂陽神通變化物我受樂即此天也虛皇天者此天真九皇所以降氣於上風下澤而造世界也氣有隂陽則人有男女洞經謂之玉童玉女此臣所以列三清所居玉清為清微天上清為禹餘天泰清為大赤天也下篇易之八卦蓋祖乎天真九皇之氣也純陽為乾而居西北純隂為坤而居西南乾陽下降而奪坤中之隂故坎中實而為月也坤隂上升而奪乾中之陽故離中虛而為日也月也者受日之氣而行於十二辰者也晦則為坤體望則為乾體三日至七日出於庚而為震八日至十二日出於丁而為兊十三至十七日出於甲而為乾十八至二十二日出於辛而為巽二十三至二十七日出於戊而為艮二十八至初二日沒於乙而為坤是故五日為一候三候為一氣而分至啓閉於是乎不差抄忽其在易之六十四象離為火為電坎為水為雲而不曰日月蓋日月者變乾坤震兊艮巽以成嵗月日時者也八於象則滯於變矣漢儒乃以四正為方伯卦又以六子為乾坤之用皆臆說也三皇五帝仲尼以此窮理以此盡性而至於命若夫不以神㑹而以智知豈非所謂過此以往未之或知者哉虛皇天天真九皇虛皇玄老虛皇玄帝虛皇玄尊虛皇玄君玉清天清微玉清天帝天寶君紫道虛皇上君翼日虛皇太上道君昌陽始虛髙皇元君七靜道生髙上虛皇君太明虛皇洞清君始玄虛皇大霄君七觀玄生虛皇金靈君八觀髙玄虛皇渟景君紫暉太上玉皇明上大道君上虛紫映九霄真王紫虛髙上玄皇道君洞虛三元太明上皇道君太素髙虛上極紫皇道君虛明紫蘭中元髙上嵉皇道君東明髙上虛皇道君西華髙上虛皇道君南朱髙上虛皇道君北真髙上虛皇道君中元上合虛皇道君五靈七明混生髙上道君三元無上真老虛皇元晨君三元四極真上虛皇元靈君三元晨中黃景虛皇元臺君三元紫映暉神虛生真元胎君髙上虛皇君上皇玉虛君皇上玉帝君皇清洞真君髙上太素君紫虛皇上太帝皇上萬始先生上皇先生紫晨君紫虛皇老上帝君青靈陽安元君真虛太真洞景君無英中真上老君上清天禹餘上清天靈寶君紫清太素髙虛洞曜三元道君紫晨太微天帝道君四斗中真七晨散華君紫虛三元紫精君真寂九元上虛皇君上清紫精三素君太虛上霄飛晨中央黃老道君太元東霞桑丹林大帝上道君金闕後聖太平李真天帝上景君太虛後聖元景彭室真君東華方諸宫髙晨師玉保王青童道君太無晨中君刋峩眉山中洞宫玉户太素君紫虛玉皇先生紫晨君太明靈輝中真無上君九皇上真司命君東方上始少陽青帝南方通陽納隂赤帝西方少隂西金白帝北方通隂太陽黑帝中央總靈髙皇黃帝泰清天大赤泰清天神寶君真陽元老真一道君太極大道元景君泰清大道君皇上四老道中君皇初紫靈元君太初九素金華景元君元虛黃房真晨君青精上真內景君天皇上真玉華三元君真洲二十九真伯上帝司禁君太極主四真人元君晨中黃景元君上清八皇老君洞清小有玉真萬華先生主圖玉君太一上元禁君太陽九氣玉賢元君太真都九氣丈人主仙君西九龜山九靈真仙毋青金丹皇君八卦降氣道言太一之先其形自然太一者元一之氣始生於太虛之中也在無極無窮之內居無形無象之初故曰太一者也上曰風下曰水二氣停澤也太虛之上有玉京之天乃玉京山也含蓮謂六元之氣感天真九皇之神而降分混沌之象一氣始化列朴而成風水之輪二氣停澤玉京之上東南西北各有八天三十二天三十二帝也玉京之上有三清之天者乃玉清聖境上清真境太清仙境之天三清之天上有虛皇十天其間乃虛皇元老虛皇元君虛皇元帝虛皇元尊與天真九皇真人而居其中天真皇人降天真九氣分六元為混沌之象也少陽應乾其象曰金降天真九皇金真之一氣而生水中狀如戲蘂變其象上赤下黑左青右白其中央簧運之中而藏是氣也少隂應巽其象曰木降天真九皇木真之二氣而生風中狀如戲蘂變其象上黑下赤左白右青其中央黃運之中而藏是氣也太陽應坎其象曰水德反火降天真九皇水德火真之三氣而生水中狀如抱卵太隂應離其象曰火德反水降天真九皇火德水真之四氣而生風中狀如抱卵陽明應震其象曰木降天真九皇木真之五氣而生水中狀如含蓮厥隂應兊其象曰金降天真九皇金真之六氣而生風中狀如含蓮三陽㑹艮其象曰土降天真九皇土真之七氣感土而生上廓散易為天故清陽為天餘氣散化成日月星辰也三隂㑹坤其象曰土降天真九皇土真之八氣感土而下開散易為地故濁隂為地餘氣融結為山川金石始出自然之正道也玉京天玉京山通明殿昊天玉皇上帝進章童子東方八天南方八天西方八天北方八天易有之門唐將軍葛將軍周將軍通真使者引進張真人受章童子奏書天蓬大元帥天猷大元帥翊聖保德真君佑聖真武靈應真君東方天玉南方天王西方天王北方天王紫微垣天皇大帝紫微帝君北斗七星君太陽帝君太隂帝君木德星君火德星君金德星君水德星君土德星君羅睺星君計都星君紫氣星君月孛星君東方七宿星君南方七宿星君西方七宿星君北方七宿星君鄷都六宫紂絶隂天宫泰煞諒事宗天宫明晨耐犯武城天宫恬照罪氣天宫宗靈七非天宫敢司連宛屢天宫三才定位圖三清之天上有虛皇十天其間乃虛皇元老虛皇元君虛皇元帝虛皇元尊與天真九皇而居真中焉虛皇三天玉清天者天寶君之所治也神景內經曰太虛妙精六合相更變化之道一生一成大洞經曰分形散影位為上真上清天者靈寶君之所治也天人身作金華色項負圓光騰身紫霞黃庭經云上清紫霞是也泰清天者神寶君之所治也天人身有光明大洞經曰身生水火放光萬劫項負圓耀浮遊九晨三才定位圖
